name: Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      APP_URL: "http://localhost:5183"
      API_URL: "http://localhost:3001"
      DATABASE_URL: "postgresql://openads:openads@localhost:5432/openads"
      BETTER_AUTH_SECRET: "test-secret"
      BETTER_AUTH_URL: "http://localhost:5183"
      GOOGLE_CLIENT_ID: "test-google-client-id"
      GOOGLE_CLIENT_SECRET: "test-google-client-secret"
      REDIS_URL: "redis://localhost:6379"
      STRIPE_SECRET_KEY: "sk_test_quality"
      STRIPE_CONNECT_CLIENT_ID: "ca_quality"
      STRIPE_CONNECT_WEBHOOK_SECRET: "whsec_quality"
      STRIPE_PLATFORM_FEE_PERCENT: "0"
      S3_REGION: "auto"
      S3_ACCESS_KEY_ID: "test-access-key"
      S3_SECRET_ACCESS_KEY: "test-secret-key"
      S3_BUCKET: "openads-quality"
      S3_ENDPOINT: "https://example.com"
      S3_PUBLIC_URL: "https://cdn.example.com"
      AUTOSEND_API_KEY: "test-autosend-key"
      AUTOSEND_FROM_EMAIL: "hello@openads.co"
      AUTOSEND_FROM_NAME: "OpenAds"
      AUTOSEND_WAITLIST_LIST_ID: "test-waitlist"
      VITE_BASE_URL: "http://localhost:5183"
      VITE_API_URL: "http://localhost:3001"
      VITE_OPENPANEL_CLIENT_ID: "test-openpanel"
      VITE_COSSISTANT_PUBLIC_KEY: "test-cossistant"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run quality gate
        run: bun run quality
